name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: token-monitor-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check release scripts
        run: |
          bash -n scripts/*.sh
          ./scripts/check-apple-distribution.sh --help
          ./scripts/check-app-store-submission-gates.sh --help
          ./scripts/check-publication-legal-gates.sh --help
          ./scripts/check-github-release-secrets.sh --help
          ./scripts/check-app-store-metadata.sh --help
          ./scripts/check-app-store-screenshots.sh --help
          ./scripts/check-app-store-identity.sh --help
          ./scripts/check-release-recovery-readiness.sh --help
          ./scripts/check-release-version-consistency.sh --help
          ./scripts/check-public-repo-hygiene.sh --help
          ./scripts/check-release-version-consistency.sh
          ./scripts/check-public-repo-hygiene.sh
          ./scripts/audit-apple-distribution.sh --help
          ./scripts/package-mas-pkg.sh --help
          ./scripts/preflight-release.sh --help
          ./scripts/preflight-mas-submission.sh --help
          ./scripts/check-app-store-upload-readiness.sh --help
          ./scripts/verify-public-release.sh --help

          if ./scripts/package-mas-pkg.sh >/tmp/token-monitor-mas-pkg.out 2>&1; then
            echo "package-mas-pkg.sh unexpectedly passed without signing identities" >&2
            exit 1
          fi
          grep -Fq "Missing TOKEN_MONITOR_MAS_CODESIGN_IDENTITY" /tmp/token-monitor-mas-pkg.out
          ./scripts/check-app-store-metadata.sh

      - name: Run tests
        run: swift test

      - name: Build direct DMG app candidate
        run: ./scripts/build-app.sh

      - name: Build MAS app candidate
        run: ./scripts/build-mas-app.sh

      - name: Verify MAS app candidate
        run: ./scripts/verify-mas-build.sh

      - name: Check MAS readiness
        run: ./scripts/check-mas-readiness.sh
