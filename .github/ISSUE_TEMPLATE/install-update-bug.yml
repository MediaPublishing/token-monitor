name: Installation, update, or Gatekeeper bug
description: Report a Token Monitor install, launch, update, Gatekeeper, or Launch at Login problem.
title: "[Install]: "
labels:
  - install
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        GitHub Issues are public. Do not post Apple ID passwords, app-specific passwords, certificate passwords, `.p12` files, GitHub Secrets, access tokens, raw debug dumps, email addresses, or screenshots with private account data.

  - type: input
    id: app-version
    attributes:
      label: Token Monitor version
      description: Example: 1.0.20 build 21
      placeholder: 1.0.20 build 21
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: macOS 15.4
    validations:
      required: true

  - type: dropdown
    id: install-source
    attributes:
      label: Install source
      options:
        - GitHub Release DMG
        - GitHub Release ZIP
        - Sparkle update
        - Local build
        - Mac App Store or TestFlight
        - Unknown
    validations:
      required: true

  - type: dropdown
    id: problem-area
    attributes:
      label: Problem area
      options:
        - Download
        - DMG open or drag to Applications
        - Gatekeeper or "Not Opened" warning
        - First launch
        - Sparkle update
        - Launch at Login
        - App Store or TestFlight install
        - Other
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      placeholder: Token Monitor should open from Applications without another warning.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: Include exact error text if it is safe and does not contain private data.
      placeholder: macOS says "TokenMonitor.app Not Opened" after opening the app from the DMG.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Download TokenMonitor-macOS.dmg from release v...
        2. Open the DMG.
        3. Drag TokenMonitor.app to Applications.
        4. Open the app.
    validations:
      required: true

  - type: checkboxes
    id: privacy-confirmation
    attributes:
      label: Privacy check
      options:
        - label: I did not include Apple credentials, GitHub Secrets, certificates, private keys, or raw debug dumps.
          required: true
        - label: I redacted screenshots before posting them publicly.
          required: true
